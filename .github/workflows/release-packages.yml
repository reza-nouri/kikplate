name: Release packages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to run against (e.g. v1.2.3). Required when using Run workflow.
        required: true
        type: string
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-packages-${{ inputs.tag || github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish-package-managers:
    name: Publish package manager metadata
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.release.prerelease == false
    steps:
      - name: Require tag for manual runs
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ -z "${{ inputs.tag }}" ]; then
            echo "workflow_dispatch requires the tag input (e.g. v1.2.3)." >&2
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Snapshot latest GoReleaser config
        run: |
          cp cli/.goreleaser.yaml /tmp/cli.goreleaser.yaml

      - name: Resolve release tag
        id: resolve-tag
        run: |
          set -euo pipefail

          raw_tag="${{ inputs.tag || github.event.release.tag_name || github.ref_name }}"
          if [ -z "$raw_tag" ]; then
            echo "Unable to determine release tag from workflow context." >&2
            exit 1
          fi

          resolved_tag=""

          if git rev-parse -q --verify "refs/tags/${raw_tag}" >/dev/null; then
            resolved_tag="${raw_tag}"
          elif [ "${raw_tag#v}" = "$raw_tag" ] && git rev-parse -q --verify "refs/tags/v${raw_tag}" >/dev/null; then
            resolved_tag="v${raw_tag}"
          elif [ "${raw_tag#v}" != "$raw_tag" ] && git rev-parse -q --verify "refs/tags/${raw_tag#v}" >/dev/null; then
            resolved_tag="${raw_tag#v}"
          else
            echo "Tag '${raw_tag}' was not found. Tried '${raw_tag}', 'v${raw_tag}', and '${raw_tag#v}'." >&2
            echo "Available tags (latest 20):" >&2
            git tag --sort=-creatordate | head -n 20 >&2
            exit 1
          fi

          echo "Resolved tag: ${resolved_tag}"
          echo "resolved_tag=${resolved_tag}" >> "${GITHUB_OUTPUT}"

      - name: Checkout resolved tag
        run: |
          git checkout --force "refs/tags/${{ steps.resolve-tag.outputs.resolved_tag }}"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check --config /tmp/cli.goreleaser.yaml

      - name: Run GoReleaser post-release pipeline
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --config /tmp/cli.goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SCOOP_BUCKET_GITHUB_TOKEN: ${{ secrets.SCOOP_BUCKET_GITHUB_TOKEN }}
