name: Release packages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to run against (e.g. v1.2.3). Required when using Run workflow.
        required: true
        type: string
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-packages-${{ inputs.tag || github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish-package-managers:
    name: Publish package manager metadata
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.release.prerelease == false
    steps:
      - name: Require tag for manual runs
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ -z "${{ inputs.tag }}" ]; then
            echo "workflow_dispatch requires the tag input (e.g. v1.2.3)." >&2
            exit 1
          fi

      - name: Checkout published tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.event.release.tag_name || github.ref_name }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check --config cli/.goreleaser.yaml

      - name: Run GoReleaser post-release pipeline
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --config cli/.goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SCOOP_BUCKET_GITHUB_TOKEN: ${{ secrets.SCOOP_BUCKET_GITHUB_TOKEN }}
