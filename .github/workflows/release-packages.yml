name: Release packages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Optional tag to run against (e.g. v1.2.3)
        required: false
        type: string
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-packages-${{ inputs.tag || github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish-package-managers:
    name: Publish package manager metadata
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.release.prerelease == false
    steps:
      - name: Checkout published tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.event.release.tag_name || github.ref_name }}
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          if [ -z "$TAG" ]; then
            echo "No tag provided/resolved" >&2
            exit 1
          fi
          case "$TAG" in
            v*) ;;
            *) TAG="v${TAG}" ;;
          esac
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Download existing release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          mkdir -p dist/prebuilt
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern "kikplate-*.tar.gz" \
            --pattern "kikplate-*.zip" \
            --dir dist/prebuilt

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check --config cli/.goreleaser.yaml

      - name: Run GoReleaser post-release pipeline
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --config cli/.goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SCOOP_BUCKET_GITHUB_TOKEN: ${{ secrets.SCOOP_BUCKET_GITHUB_TOKEN }}
          WINGET_PKGS_TOKEN: ${{ secrets.WINGET_PKGS_TOKEN }}
