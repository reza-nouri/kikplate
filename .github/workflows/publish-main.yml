name: Publish Main Images

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-main
  cancel-in-progress: true

jobs:
  api-quality:
    uses: ./.github/workflows/reusable-api-quality.yml

  web-quality:
    uses: ./.github/workflows/reusable-web-quality.yml

  publish-images:
    name: Build And Push Images
    runs-on: ubuntu-latest
    needs:
      - api-quality
      - web-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image names
        id: prep
        run: |
          owner=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          sha_short=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "owner=${owner}" >> "${GITHUB_OUTPUT}"
          echo "sha_short=${sha_short}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha,scope=api-main
          cache-to: type=gha,mode=max,scope=api-main
          tags: |
            ghcr.io/${{ steps.prep.outputs.owner }}/kikplate-api:main
            ghcr.io/${{ steps.prep.outputs.owner }}/kikplate-api:sha-${{ steps.prep.outputs.sha_short }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha,scope=web-main
          cache-to: type=gha,mode=max,scope=web-main
          tags: |
            ghcr.io/${{ steps.prep.outputs.owner }}/kikplate-web:main
            ghcr.io/${{ steps.prep.outputs.owner }}/kikplate-web:sha-${{ steps.prep.outputs.sha_short }}
