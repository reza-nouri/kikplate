name: Release Candidate

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build RC from
        required: true
        default: pre-release
        type: string
      push_images:
        description: Push RC images to GHCR
        required: true
        default: true
        type: boolean
      rc_tag:
        description: Optional RC tag override (for image tags)
        required: false
        type: string
      changelog:
        description: Optional inline markdown notes for GitHub prerelease
        required: false
        type: string
      changelog_file:
        description: Optional markdown file path in repo (recommended for long notes)
        required: false
        default: .github/rc-notes.md
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: rc-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  resolve-ref:
    name: Resolve Build Ref
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.out.outputs.ref }}
      push_images: ${{ steps.out.outputs.push_images }}
    steps:
      - name: Resolve ref and push behavior
        id: out
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.ref }}" >> "${GITHUB_OUTPUT}"
            echo "push_images=${{ inputs.push_images }}" >> "${GITHUB_OUTPUT}"
          else
            echo "ref=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
            echo "push_images=true" >> "${GITHUB_OUTPUT}"
          fi

  prepare-rc-metadata:
    name: Prepare RC Metadata
    runs-on: ubuntu-latest
    needs: resolve-ref
    outputs:
      owner: ${{ steps.meta.outputs.owner }}
      rc_tag: ${{ steps.meta.outputs.rc_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - name: Prepare RC tags
        id: meta
        run: |
          owner=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          sha_short=$(git rev-parse --short=7 HEAD)
          ref_slug=$(echo "${{ needs.resolve-ref.outputs.ref }}" | tr '/:@' '-' | tr '[:upper:]' '[:lower:]')
          ts=$(date +%Y%m%d%H%M)
          rc_tag="${{ inputs.rc_tag }}"

          if [ -z "$rc_tag" ]; then
            rc_tag="rc-${ref_slug}-${ts}-${sha_short}"
          fi

          echo "owner=${owner}" >> "${GITHUB_OUTPUT}"
          echo "rc_tag=${rc_tag}" >> "${GITHUB_OUTPUT}"

  api-quality:
    needs: resolve-ref
    uses: ./.github/workflows/reusable-api-quality.yml
    with:
      ref: ${{ needs.resolve-ref.outputs.ref }}

  web-quality:
    needs: resolve-ref
    uses: ./.github/workflows/reusable-web-quality.yml
    with:
      ref: ${{ needs.resolve-ref.outputs.ref }}

  cli-quality:
    needs: resolve-ref
    uses: ./.github/workflows/reusable-cli-quality.yml
    with:
      ref: ${{ needs.resolve-ref.outputs.ref }}

  build-rc-images:
    name: Build RC Docker Images
    runs-on: ubuntu-latest
    needs:
      - resolve-ref
      - prepare-rc-metadata
      - api-quality
      - web-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: needs.resolve-ref.outputs.push_images == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API RC image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.resolve-ref.outputs.push_images == 'true' }}
          cache-from: type=gha,scope=api-rc
          cache-to: type=gha,mode=max,scope=api-rc
          tags: |
            ghcr.io/${{ needs.prepare-rc-metadata.outputs.owner }}/kikplate-api:${{ needs.prepare-rc-metadata.outputs.rc_tag }}
            ghcr.io/${{ needs.prepare-rc-metadata.outputs.owner }}/kikplate-api:pre-release-latest

      - name: Build and push web RC image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.resolve-ref.outputs.push_images == 'true' }}
          cache-from: type=gha,scope=web-rc
          cache-to: type=gha,mode=max,scope=web-rc
          tags: |
            ghcr.io/${{ needs.prepare-rc-metadata.outputs.owner }}/kikplate-web:${{ needs.prepare-rc-metadata.outputs.rc_tag }}
            ghcr.io/${{ needs.prepare-rc-metadata.outputs.owner }}/kikplate-web:pre-release-latest

  build-rc-cli:
    name: Build RC CLI Packages
    runs-on: ubuntu-latest
    needs:
      - resolve-ref
      - prepare-rc-metadata
      - cli-quality
    defaults:
      run:
        working-directory: cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Build CLI binaries and package tarballs
        run: |
          mkdir -p ./dist
          version="${{ needs.prepare-rc-metadata.outputs.rc_tag }}"

          for os in darwin linux; do
            for arch in amd64 arm64; do
              bin="kik-${version}-${os}-${arch}"
              CGO_ENABLED=0 GOOS="${os}" GOARCH="${arch}" go build -o "./dist/${bin}" ./
              tar -C ./dist -czf "./dist/${bin}.tar.gz" "${bin}"
              rm -f "./dist/${bin}"
            done
          done

          cd ./dist
          shasum -a 256 *.tar.gz > checksums.txt

      - name: Upload CLI RC artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rc-cli-artifacts
          path: |
            cli/dist/*.tar.gz
            cli/dist/checksums.txt

  publish-rc:
    name: Create GitHub Prerelease
    runs-on: ubuntu-latest
    needs:
      - resolve-ref
      - prepare-rc-metadata
      - build-rc-images
      - build-rc-cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - name: Prepare prerelease notes file
        run: |
          if [ -n "${{ inputs.changelog }}" ]; then
            cat > RC_NOTES.md <<'EOF'
          ${{ inputs.changelog }}
          EOF
          elif [ -f "${{ inputs.changelog_file }}" ]; then
            cp "${{ inputs.changelog_file }}" RC_NOTES.md
          else
            cat > RC_NOTES.md <<'EOF'
          ## Release Candidate

          - Ref: ${{ needs.resolve-ref.outputs.ref }}
          - Image tag: ${{ needs.prepare-rc-metadata.outputs.rc_tag }}
          - API image: ghcr.io/${{ needs.prepare-rc-metadata.outputs.owner }}/kikplate-api:${{ needs.prepare-rc-metadata.outputs.rc_tag }}
          - Web image: ghcr.io/${{ needs.prepare-rc-metadata.outputs.owner }}/kikplate-web:${{ needs.prepare-rc-metadata.outputs.rc_tag }}
          EOF
          fi

      - name: Download CLI RC assets
        uses: actions/download-artifact@v4
        with:
          name: rc-cli-artifacts
          path: release-assets

      - name: Create git RC tag
        run: |
          if git rev-parse "${{ needs.prepare-rc-metadata.outputs.rc_tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ needs.prepare-rc-metadata.outputs.rc_tag }} already exists" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.prepare-rc-metadata.outputs.rc_tag }}"
          git push origin "${{ needs.prepare-rc-metadata.outputs.rc_tag }}"

      - name: Create GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-rc-metadata.outputs.rc_tag }}
          name: ${{ needs.prepare-rc-metadata.outputs.rc_tag }}
          body_path: RC_NOTES.md
          prerelease: true
          generate_release_notes: false
          files: |
            release-assets/*.tar.gz
            release-assets/checksums.txt
