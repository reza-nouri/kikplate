version: 2

project_name: kik

builds:
  - id: cli
    dir: cli
    main: .
    binary: kik
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
  - id: cli-windows
    dir: cli
    main: .
    binary: kik
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64

archives:
  - id: cli-unix-archives
    ids:
      - cli
    formats: [tar.gz]
    name_template: "kik-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
  - id: cli-windows-archives
    ids:
      - cli-windows
    formats: [zip]
    name_template: "kik-{{ .Version }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

homebrew_casks:
  - name: kik
    ids:
      - cli-unix-archives
    url:
      template: "https://github.com/kikplate/kikplate/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
      verified: github.com/kikplate/kikplate/
    repository:
      owner: kikplate
      name: homebrew-kikplate
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com
    homepage: "https://github.com/kikplate/kikplate"
    description: "Command-line interface for the Kikplate plate registry"
    caveats: "If macOS blocks execution, run: xattr -dr com.apple.quarantine $(brew --prefix)/Caskroom/kik/*/kik"

scoops:
  - name: kik
    ids:
      - cli-windows-archives
    repository:
      owner: kikplate
      name: scoop-bucket
      branch: main
      token: "{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}"
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com
    commit_msg_template: "Scoop update for {{ .ProjectName }} version {{ .Tag }}"
    homepage: "https://github.com/kikplate/kikplate"
    description: "Command-line interface for the Kikplate plate registry"
    license: "Apache-2.0"
    url_template: "https://github.com/kikplate/kikplate/releases/download/{{ .Tag }}/{{ .ArtifactName }}"

release:
  disable: false
  name_template: "{{ .Tag }}"
  mode: keep-existing
  replace_existing_artifacts: true
