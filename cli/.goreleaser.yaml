version: 2

project_name: kikplate

before:
  hooks:
    - sh -c "cd cli && go mod tidy"

builds:
  - id: cli
    dir: cli
    main: .
    binary: "kikplate-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
  - id: cli-linux-package
    dir: cli
    main: .
    binary: kikplate
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
  - id: cli-windows
    dir: cli
    main: .
    binary: "kikplate-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64

archives:
  - id: cli-unix-archives
    ids:
      - cli
    formats: [tar.gz]
    name_template: "{{ .Binary }}"
  - id: cli-windows-archives
    ids:
      - cli-windows
    formats: [zip]
    name_template: "{{ .Binary }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

brews:
  - name: kikplate
    ids:
      - cli-unix-archives
    url_template: "https://github.com/kikplate/kikplate/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    repository:
      owner: kikplate
      name: homebrew-kikplate
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com
    directory: Formula
    homepage: "https://github.com/kikplate/kikplate"
    description: "Command-line interface for the Kikplate plate registry"
    license: "Apache-2.0"

scoops:
  - name: kikplate
    ids:
      - cli-windows-archives
    repository:
      owner: kikplate
      name: scoop-bucket
      branch: main
      token: "{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}"
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com
    commit_msg_template: "Scoop update for {{ .ProjectName }} version {{ .Tag }}"
    homepage: "https://github.com/kikplate/kikplate"
    description: "Command-line interface for the Kikplate plate registry"
    license: "Apache-2.0"
    url_template: "https://github.com/kikplate/kikplate/releases/download/{{ .Tag }}/{{ .ArtifactName }}"

nfpms:
  - id: linux-packages
    ids:
      - cli-linux-package
    package_name: kikplate
    file_name_template: "{{ .PackageName }}_{{ .Version }}_{{ .Arch }}"
    vendor: Kikplate
    homepage: "https://github.com/kikplate/kikplate"
    maintainer: "Kikplate Maintainers <opensource@kikplate.dev>"
    description: "Command-line interface for the Kikplate plate registry"
    license: Apache-2.0
    formats:
      - deb
      - rpm
    bindir: /usr/bin

release:
  disable: true
