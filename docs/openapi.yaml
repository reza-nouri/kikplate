openapi: 3.0.3
info:
  title: Kikplate API
  version: 1.0.0
  description: HTTP API for auth, plates, organizations, and badges.
servers:
  - url: http://localhost:3001
    description: Local
  - url: https://api.example.com
    description: Production (example)
tags:
  - name: Auth
  - name: Plates
  - name: Organizations
  - name: Badges
  - name: Health
  - name: Generator
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      example:
        error: "record not found"

    AuthTokens:
      type: object
      properties:
        access_token:
          type: string
          description: Short-lived JWT for accessing protected endpoints.
        refresh_token:
          type: string
          description: Long-lived token used to obtain a new access token.
      required: [access_token, refresh_token]

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        avatar_url:
          type: string
          nullable: true
        role:
          type: string
          enum: [member, admin]
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Account:
      type: object
      description: >
        An account links a provider identity (local, github, google, gitlab) to a
        User record. A single user may have multiple accounts from different providers.
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
          nullable: true
        provider:
          type: string
          description: Identity provider slug (local, github, google, gitlab).
          example: github
        provider_user_id:
          type: string
        display_name:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    Badge:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
          example: official
        name:
          type: string
          example: Official
        description:
          type: string
        icon:
          type: string
        tier:
          type: string
          enum: [community, verified, official, sponsored]
        created_at:
          type: string
          format: date-time

    PlateBadge:
      type: object
      description: A badge awarded to a specific plate.
      properties:
        id:
          type: string
          format: uuid
        plate_id:
          type: string
          format: uuid
        badge_id:
          type: string
          format: uuid
        granted_by:
          type: string
        reason:
          type: string
          nullable: true
        granted_at:
          type: string
          format: date-time
        badge:
          $ref: '#/components/schemas/Badge'

    PlateTag:
      type: object
      properties:
        id:
          type: string
          format: uuid
        plate_id:
          type: string
          format: uuid
        tag:
          type: string

    Organization:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        logo_url:
          type: string
          nullable: true
        owner_id:
          type: string
          format: uuid
        owner:
          $ref: '#/components/schemas/Account'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Plate:
      type: object
      description: Summary representation of a plate, returned in list endpoints.
      properties:
        id:
          type: string
          format: uuid
        owner_id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
          nullable: true
        type:
          type: string
          enum: [repository]
        slug:
          type: string
          example: my-fastapi-starter
        name:
          type: string
          example: My FastAPI Starter
        description:
          type: string
          nullable: true
        category:
          type: string
          example: backend
        status:
          type: string
          enum: [pending, approved, rejected, archived]
        visibility:
          type: string
          enum: [public, private, unlisted]
        bookmark_count:
          type: integer
        star_count:
          type: integer
        avg_rating:
          type: number
          format: float
        is_verified:
          type: boolean
        verified_at:
          type: string
          format: date-time
          nullable: true
        published_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        repo_url:
          type: string
          nullable: true
        branch:
          type: string
          nullable: true
        sync_status:
          type: string
          enum: [pending, syncing, synced, failed, unverified]
          nullable: true
        last_synced_at:
          type: string
          format: date-time
          nullable: true
        user_rating:
          type: integer
          nullable: true
          description: Rating the authenticated user gave this plate (omitted if unauthenticated).
        owner:
          $ref: '#/components/schemas/Account'
        organization:
          $ref: '#/components/schemas/Organization'
        tags:
          type: array
          items:
            $ref: '#/components/schemas/PlateTag'
        badges:
          type: array
          items:
            $ref: '#/components/schemas/PlateBadge'

    PlateReview:
      type: object
      properties:
        id:
          type: string
          format: uuid
        plate_id:
          type: string
          format: uuid
        reviewer_id:
          type: string
          format: uuid
        rating:
          type: integer
          minimum: 1
          maximum: 5
        title:
          type: string
          nullable: true
        body:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    PlateListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Plate'
        total:
          type: integer
          description: Total number of matching records across all pages.

    OrganizationListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Organization'

    GeneratorSchemaField:
      type: object
      properties:
        type:
          type: string
        required:
          type: boolean
        values:
          type: array
          items:
            type: string
        default: {}

    GeneratorModuleDefinition:
      type: object
      properties:
        enabled:
          type: boolean

    GeneratorFileEntry:
      type: object
      properties:
        path:
          type: string
        template:
          type: string
        condition:
          type: string

    GeneratorSchema:
      type: object
      properties:
        name:
          type: string
        schema:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/GeneratorSchemaField'
        modules:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/GeneratorModuleDefinition'
        files:
          type: array
          items:
            $ref: '#/components/schemas/GeneratorFileEntry'

    GeneratorRequest:
      type: object
      properties:
        values:
          type: object
          additionalProperties: true

    GeneratorError:
      type: object
      properties:
        error:
          type: string
paths:
  /hello:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: OK

  /auth/register:
    post:
      tags: [Auth]
      summary: Register local user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password]
              properties:
                username:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: Registered
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/verify-email:
    get:
      tags: [Auth]
      summary: Verify email token
      parameters:
        - in: query
          name: token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Verified

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with local credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/providers:
    get:
      tags: [Auth]
      summary: List OAuth providers
      responses:
        '200':
          description: OK

  /auth/{provider}/redirect:
    get:
      tags: [Auth]
      summary: OAuth redirect URL
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Redirect

  /auth/{provider}/callback:
    get:
      tags: [Auth]
      summary: OAuth callback
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Logged in

  /me:
    get:
      tags: [Auth]
      summary: Get current account profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /me/profile:
    patch:
      tags: [Auth]
      summary: Update display profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                avatar_url:
                  type: string
      responses:
        '200':
          description: Updated

  /me/username:
    patch:
      tags: [Auth]
      summary: Set or update username
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username:
                  type: string
      responses:
        '200':
          description: Updated

  /plates:
    get:
      tags: [Plates]
      summary: List plates
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: categories
          schema:
            type: string
        - in: query
          name: tags
          schema:
            type: string
        - in: query
          name: badges
          schema:
            type: string
          description: Comma-separated badge slugs (alias query key `badge`)
        - in: query
          name: badge
          schema:
            type: string
          description: Badge slug(s); comma-separated allowed
        - in: query
          name: owner_id
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlateListResponse'

  /plates/stats:
    get:
      tags: [Plates]
      summary: Aggregated plate stats
      responses:
        '200':
          description: OK

  /plates/filters:
    get:
      tags: [Plates]
      summary: Filter options for listing
      responses:
        '200':
          description: OK

  /plates/bookmarked:
    get:
      tags: [Plates]
      summary: List current user's bookmarked plates
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 48
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlateListResponse'
        '401':
          description: Unauthorized

  /plates/repository:
    post:
      tags: [Plates]
      summary: Submit repository-backed plate
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [repo_url]
              properties:
                repo_url:
                  type: string
                branch:
                  type: string
                organization_id:
                  type: string
      responses:
        '201':
          description: Created

  /plates/{slug}:
    get:
      tags: [Plates]
      summary: Get plate by slug
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plate'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /plates/{id}:
    patch:
      tags: [Plates]
      summary: Update plate
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                category:
                  type: string
                visibility:
                  type: string
      responses:
        '200':
          description: Updated

    delete:
      tags: [Plates]
      summary: Archive plate
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Archived

  /plates/{id}/remove:
    delete:
      tags: [Plates]
      summary: Hard delete plate
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Removed

  /plates/{id}/verify:
    post:
      tags: [Plates]
      summary: Verify repository plate token
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Verified

  /plates/{id}/organization:
    put:
      tags: [Plates]
      summary: Move plate organization scope
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                organization_id:
                  type: string
      responses:
        '200':
          description: Updated

  /plates/{id}/bookmark:
    post:
      tags: [Plates]
      summary: Set bookmark state for current user
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bookmarked]
              properties:
                bookmarked:
                  type: boolean
      responses:
        '204':
          description: Updated

  /plates/{id}/reviews:
    post:
      tags: [Plates]
      summary: Submit plate review
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rating]
              properties:
                rating:
                  type: integer
                title:
                  type: string
                body:
                  type: string
      responses:
        '201':
          description: Created

  /plates/{id}/tags:
    put:
      tags: [Plates]
      summary: Replace plate tags
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '204':
          description: Updated

  /plates/{id}/approve:
    post:
      tags: [Plates]
      summary: Approve plate
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Approved

  /plates/{id}/reject:
    post:
      tags: [Plates]
      summary: Reject plate
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Rejected

  /plates/{id}/badges:
    post:
      tags: [Plates]
      summary: Grant badge to plate
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [badge_slug]
              properties:
                badge_slug:
                  type: string
                reason:
                  type: string
      responses:
        '201':
          description: Granted

  /plates/{id}/badges/{slug}:
    delete:
      tags: [Plates]
      summary: Revoke badge from plate
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Revoked

  /organizations:
    get:
      tags: [Organizations]
      summary: List public organizations
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationListResponse'
    post:
      tags: [Organizations]
      summary: Create organization
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, description]
              properties:
                name:
                  type: string
                description:
                  type: string
                logo_url:
                  type: string
      responses:
        '201':
          description: Created

  /organizations/me:
    get:
      tags: [Organizations]
      summary: List current user's organizations
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK

  /organizations/by-name/{name}:
    get:
      tags: [Organizations]
      summary: Get organization by name
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /organizations/{id}:
    get:
      tags: [Organizations]
      summary: Get organization by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags: [Organizations]
      summary: Update organization
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                logo_url:
                  type: string
      responses:
        '200':
          description: Updated
    delete:
      tags: [Organizations]
      summary: Delete organization
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted

  /badges:
    get:
      tags: [Badges]
      summary: List badge catalog
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Badge'

  /generate/{slug}/schema:
    get:
      tags: [Generator]
      summary: Get plate generation schema
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneratorSchema'
        '404':
          description: Plate not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneratorError'
        '422':
          description: Plate cannot be generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneratorError'

  /generate/{slug}:
    post:
      tags: [Generator]
      summary: Generate project archive from plate values
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneratorRequest'
      responses:
        '200':
          description: Generated zip archive
          headers:
            X-Generation-ID:
              description: Persisted generation identifier
              schema:
                type: string
                format: uuid
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid generation input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneratorError'
        '404':
          description: Plate not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneratorError'
        '422':
          description: Plate or template cannot be generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneratorError'
        '502':
          description: Failed to fetch remote plate content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneratorError'
