<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password changed</title>
</head>
<body style="margin:0;padding:24px;background:#f7fafc;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a202c;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
    <tr>
      <td align="center">
        <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="max-width:560px;background:#ffffff;border:1px solid #e2e8f0;border-radius:12px;">
          <tr>
            <td style="padding:22px 28px 0 28px;">
              <div style="display:inline-flex;align-items:center;">
                <img src="{{ .LogoURL }}" alt="Kikplate" width="140" style="display:block;height:auto;border:0;outline:none;text-decoration:none;" />
              </div>
            </td>
          </tr>
          <tr>
            <td style="padding:24px 28px;">
              <h1 style="margin:0 0 12px 0;font-size:20px;">Your password was changed</h1>
              <p style="margin:0 0 20px 0;font-size:15px;line-height:1.6;">If this was not you, please reset your password immediately and contact support.</p>
              <hr style="border:none;border-top:1px solid #e2e8f0;margin:0 0 14px 0;" />
              <p style="margin:0;font-size:14px;line-height:1.7;color:#334155;">Warm regards,<br /><strong>The Kikplate Team</strong></p>
              <p style="margin:8px 0 0 0;font-size:12px;line-height:1.6;color:#64748b;">Discover, share, and ship better templates.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
